<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuctionCore v2.0 | Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- AUTHENTICATION OVERLAY -->
    <div id="login-overlay" class="overlay">
        <div class="login-card">
            <h1>AUCTION<span>CORE</span></h1>
            <p class="login-subtitle">Secure Access Protocol | Authentication Required</p>
            
            <div class="auth-tabs">
                <button type="button" id="tab-signin" class="auth-tab active" onclick="switchAuth('signin')">Sign In</button>
                <button type="button" id="tab-signup" class="auth-tab" onclick="switchAuth('signup')">Sign Up</button>
            </div>

            <!-- Sign In Form -->
            <div id="signin-form" class="login-form">
                <input type="text" id="signin-user" placeholder="Username" autocomplete="off">
                <input type="password" id="signin-pass" placeholder="Password">
                <button type="button" onclick="handleSignIn()" class="login-btn">SIGN IN</button>
            </div>

            <!-- Sign Up Form (Compulsory for first-time visitors) -->
            <div id="signup-form" class="login-form hidden">
                <input type="text" id="signup-new-user" placeholder="Create Username" autocomplete="off">
                <input type="email" id="signup-email" placeholder="Email Address">
                <input type="password" id="signup-new-pass" placeholder="Create Password">
                <button type="button" onclick="handleSignUp()" class="login-btn">CREATE ACCOUNT</button>
            </div>
        </div>
    </div>

    <!-- DASHBOARD (Interface strictly preserved from screenshot) -->
    <div id="dashboard" class="hidden">
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="sidebar-logo">AC <span>v2.0</span></div>
                <nav class="nav-links">
                    <a href="#" class="active"><span>🏠</span> Dashboard</a>
                    <a href="#"><span>📊</span> Market Trends</a>
                    <a href="#"><span>🛡️</span> Security</a>
                    <a href="#"><span>📞</span> Contact Support</a>
                </nav>
            </div>

            <div class="user-profile-section">
                <hr class="profile-divider">
                <div class="profile-content">
                    <div class="user-avatar-icon">👤</div>
                    <div class="user-details-group">
                        <span class="active-bidder-label">ACTIVE BIDDER</span>
                        <h4 id="display-username">Guest</h4>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="dashboard-header">
                <div class="header-left">
                    <h1>Live Auction Bidding System</h1>
                    <p id="live-users">Users Connected: 0</p>
                </div>
                <div class="header-right">
                    <div class="system-status">● System Online</div>
                    <button class="reset-btn" onclick="resetAll()">RESET DATA</button>
                </div>
            </header>

            <div class="dashboard-grid">
                <div id="auction-container" class="grid-container"></div>
                <aside class="activity-log">
                    <h3>Live Activity Feed</h3>
                    <div id="activity-feed"></div>
                </aside>
            </div>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
