<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuctionCore v2.0 | Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- AUTHENTICATION SCREEN -->
    <div id="login-overlay" class="overlay">
        <div class="login-card">
            <h1>AUCTION<span>CORE</span></h1>
            
            <div class="auth-tabs">
                <button id="tab-signin" class="auth-tab active" onclick="switchAuth('signin')">Sign In</button>
                <button id="tab-signup" class="auth-tab" onclick="switchAuth('signup')">Sign Up</button>
            </div>

            <!-- Sign In View -->
            <div id="signin-form" class="login-form">
                <input type="text" id="signin-user" placeholder="Username" autocomplete="off">
                <input type="password" id="signin-pass" placeholder="Password">
                <button onclick="handleAuth('signin')" class="login-btn">LOGIN TO DASHBOARD</button>
            </div>

            <!-- Sign Up View -->
            <div id="signup-form" class="login-form hidden">
                <input type="text" id="signup-user" placeholder="Choose Username" autocomplete="off">
                <input type="email" id="signup-email" placeholder="Email Address">
                <input type="password" id="signup-pass" placeholder="Create Password">
                <button onclick="handleAuth('signup')" class="login-btn">CREATE ACCOUNT</button>
            </div>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboard" class="hidden">
        <aside class="sidebar">
            <div class="sidebar-logo">AC <span>v2.0</span></div>
            <nav class="nav-links">
                <a href="#" class="active">Dashboard</a>
                <a href="#">Market Trends</a>
            </nav>

            <div class="user-profile-section">
                <hr class="profile-divider">
                <div class="profile-content">
                    <div class="user-avatar-icon">👤</div>
                    <div class="user-details-group">
                        <span class="active-bidder-label">ACTIVE BIDDER</span>
                        <h4 id="display-username">Guest</h4>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="dashboard-header">
                <h1>Live Auction Meeting System</h1>
                <p id="live-users">Users Connected: 0</p>
            </header>
            <div id="auction-container" class="grid-container"></div>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
