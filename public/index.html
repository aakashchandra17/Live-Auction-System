<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuctionCore v2.0 | Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- LOGIN SECTION -->
    <div id="login-overlay" class="overlay">
        <div class="login-card">
            <div class="glitch-wrapper">
                <h1 class="logo-text">AUCTION<span>CORE</span></h1>
            </div>
            <p>Secure Access Protocol | Enter Name to Join</p>
            <input type="text" id="username-input" placeholder="Username..." autocomplete="off">
            <button onclick="handleLogin()" class="login-btn">INITIALIZE DASHBOARD</button>
        </div>
    </div>

    <!-- MAIN DASHBOARD (Hidden until login) -->
    <div id="dashboard" class="hidden">
        <aside class="sidebar">
            <div class="sidebar-logo">AC <span>v2.0</span></div>
            <nav class="nav-links">
                <a href="#" class="active"><span>🏠</span> Dashboard</a>
                <a href="#"><span>📊</span> Market Trends</a>
                <a href="#"><span>🛡️</span> Security</a>
                <a href="#"><span>📞</span> Contact Support</a>
            </nav>
            <div class="user-tag">
                <div class="user-avatar"></div>
                <div class="user-details">
                    <span id="display-username">Guest</span>
                    <small>Active Bidder</small>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="dashboard-header">
                <div class="header-left">
                    <h1>Live Auction Meeting System</h1>
                    <p id="live-users">Users Connected: 0</p>
                </div>
                <div class="header-right">
                    <div class="system-status">● System Online</div>
                    <button class="reset-btn" onclick="resetAll()">RESET ALL DATA</button>
                </div>
            </header>

            <div class="dashboard-grid">
                <!-- Auction Grid Section -->
                <section class="auction-section">
                    <div id="auction-container" class="grid-container">
                        <!-- 9 Boxes injected by Script -->
                    </div>
                </section>

                <!-- Activity Sidebar -->
                <aside class="activity-log">
                    <h3>Live Activity Feed</h3>
                    <div id="activity-feed"></div>
                </aside>
            </div>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
